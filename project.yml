name: RBCInvesting
options:
  bundleIdPrefix: com.rbcdirectinvesting
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  Charts:
    url: https://github.com/danielgindi/Charts
    from: "5.1.0"

targets:
  RBCInvesting:
    type: application
    platform: iOS
    sources:
      - path: RBCInvesting
        excludes:
          - "App/Info.plist"
          - "RBCImprovement/**"
    settings:
      base:
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: RBCInvesting/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rbcdirectinvesting.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - package: Charts
        product: DGCharts
